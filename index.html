<script>
  const PHONE_DISPLAY = "+7 995 057-41-13";
  const PHONE_PLAIN = "+79950574113";

  // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ ИЗ MAX
  const MAX_CHAT_URL = "https://max.ru/u/ВСТАВЬ_СВОЙ_ТОКЕН";

  const MAX_WEB_FALLBACK = "https://web.max.ru/";

  const maxBtn = document.getElementById("maxBtn");
  const copyPhone = document.getElementById("copyPhone");

  function hasRealMaxLink(){
    return MAX_CHAT_URL && !MAX_CHAT_URL.includes("ВСТАВЬ_СВОЙ_ТОКЕН");
  }

  maxBtn.addEventListener("click", (e) => {
    e.preventDefault();

    if (hasRealMaxLink()) {
      window.location.href = MAX_CHAT_URL;

      setTimeout(() => {
        window.open(MAX_WEB_FALLBACK, "_blank", "noopener");
      }, 1000);

      return;
    }

    window.open(MAX_WEB_FALLBACK, "_blank", "noopener");
  });

  copyPhone.addEventListener("click", async (e) => {
    e.preventDefault();
    try {
      await navigator.clipboard.writeText(PHONE_PLAIN);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = PHONE_PLAIN;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
  });

  const fmt = (n) => {
    if (!isFinite(n)) return "—";
    return new Intl.NumberFormat("ru-RU").format(Math.round(n)) + " ₽";
  };

  function recalc(){
    const rate  = Number(document.getElementById("rate").value  || 0);
    const hours = Number(document.getElementById("hours").value || 0);
    const weeks = Number(document.getElementById("weeks").value || 0);
    const sales = Number(document.getElementById("sales").value || 0);

    const fixed   = rate * hours * weeks;
    const percent = sales * 0.05;
    const monthly = fixed + percent;

    document.getElementById("fixed").textContent   = fmt(fixed);
    document.getElementById("percent").textContent = fmt(percent);
    document.getElementById("monthly").textContent = fmt(monthly);
  }

  ["rate","hours","weeks","sales"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input", recalc);
    el.addEventListener("change", recalc);
  });

  recalc();
</script>
